<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Артем Шутер: Взрывы + Салют + Проигрыш + Фото</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0b1525 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Fira Code', monospace;
            padding: 20px;
        }

        .game-wrapper {
            background: #1a1f2e;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid #ffcc44;
            position: relative;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 0 0 3px #2a2f3e, 0 10px 25px rgba(0,0,0,0.5);
            cursor: crosshair;
            background: #0c1122;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 20px;
            margin-bottom: 15px;
            background: #0f1422cc;
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-radius: 60px;
            border: 1px solid #ffcc4488;
            flex-wrap: wrap;
            gap: 12px;
        }

        .score-box {
            background: #000000aa;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffdd99;
            font-family: monospace;
        }

        .score-box span {
            color: #ffaa44;
            font-size: 2rem;
        }

        button {
            background: #7a2e2e;
            border: none;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 8px 24px;
            border-radius: 40px;
            color: #ffddaa;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 0 #3a1a1a;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #3a1a1a;
        }

        .sound-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #00000088;
            padding: 5px 15px;
            border-radius: 40px;
        }

        .sound-btn {
            background: #2a4a6e;
            box-shadow: 0 3px 0 #1a2a3a;
            padding: 5px 16px;
            font-size: 1rem;
        }

        .message-area {
            text-align: center;
            margin-top: 15px;
            font-size: 1rem;
            background: #010101aa;
            padding: 8px;
            border-radius: 40px;
            color: #ffcc88;
        }

        h3 {
            text-align: center;
            color: #ffcc66;
            margin-bottom: 10px;
            text-shadow: 0 2px 0 #442200;
        }

        .victory-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            font-family: 'Courier New', monospace;
        }

        .victory-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .defeat-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            font-family: 'Courier New', monospace;
        }

        .defeat-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .victory-card, .defeat-card {
            background: linear-gradient(145deg, #2a2418, #1e1a12);
            border-radius: 48px;
            padding: 30px 40px;
            text-align: center;
            border: 4px solid #ffcc44;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,200,0.3);
            max-width: 500px;
            width: 90%;
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .defeat-card {
            border-color: #aa5555;
            background: linear-gradient(145deg, #2a1a1a, #1e1212);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .victory-card h2, .defeat-card h2 {
            font-size: 2.8rem;
            color: #ffdd99;
            text-shadow: 3px 3px 0 #aa4422;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        .defeat-card h2 {
            color: #ff8866;
            text-shadow: 3px 3px 0 #662222;
        }

        .friend-photo {
            width: 400px;
            height: 250px;
            object-fit: cover;
            border-radius: 32px;
            border: 5px solid #ffaa44;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin: 15px auto;
            display: block;
            background: #2a2418;
        }

        .defeat-card .friend-photo {
            border-color: #aa5555;
            filter: brightness(0.9);
        }

        .dr-caption {
            font-size: 2rem;
            font-weight: bold;
            color: #ffaa55;
            background: #2a1e12cc;
            display: inline-block;
            padding: 10px 35px;
            border-radius: 60px;
            margin-top: 20px;
            letter-spacing: 3px;
            border: 1px solid #ffcc66;
            backdrop-filter: blur(4px);
        }

        .defeat-caption {
            color: #ff8866;
            border-color: #aa5555;
            font-size: 1.8rem;
        }

        .close-btn {
            background: #b3472c;
            margin-top: 25px;
            padding: 12px 28px;
            font-size: 1.3rem;
            border: none;
            border-radius: 60px;
            color: #ffefcf;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #5a2a1a;
        }

        .close-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #5a2a1a;
        }

        @media (max-width: 600px) {
            .friend-photo { width: 200px; height: 200px; }
            .victory-card h2, .defeat-card h2 { font-size: 2rem; }
            .dr-caption { font-size: 1.5rem; }
            .defeat-caption { font-size: 1.3rem; }
        }

        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            z-index: 10;
        }

        .start-message {
            background: linear-gradient(145deg, #2a2418, #1e1a12);
            padding: 30px 40px;
            border-radius: 48px;
            text-align: center;
            border: 3px solid #ffcc44;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); border-color: #ffcc44; }
            50% { transform: scale(1.05); border-color: #ffaa66; }
            100% { transform: scale(1); border-color: #ffcc44; }
        }

        .start-message p {
            color: #ffdd99;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .start-message button {
            font-size: 1.5rem;
            padding: 12px 32px;
        }

        .game-wrapper {
            position: relative;
        }
    </style>
</head>
<body>
<div>
    <div class="game-wrapper" id="gameWrapper">
        <h3>💥 АРТЕМ: ВЗРЫВНАЯ ОХОТА НА ПОДАРКИ 💥</h3>
        <canvas id="gameCanvas" width="900" height="550"></canvas>
        
        <div class="info-panel">
            <div class="score-box">🎯 ГОДИКОВ: <span id="scoreValue">0</span> / 28</div>
            <div class="sound-controls">
                <button id="musicToggleBtn" class="sound-btn">🎵 МУЗЫКА ВКЛ</button>
                <button id="sfxToggleBtn" class="sound-btn">🔊 ЗВУКИ ВКЛ</button>
            </div>
            <button id="resetButton">💣 НОВАЯ ИГРА</button>
        </div>
        <div class="message-area" id="gameMessage">
            💥 Нажми «НАЧАТЬ ИГРУ» чтобы начать!
        </div>
        
        <div id="startOverlay" class="start-overlay">
            <div class="start-message">
                <p>🎯 ГОТОВ СТРЕЛЯТЬ? ПОДУМАЙ, СКОЛЬКО ТЕБЕ БУДЕТ ЛЕТ 🎯</p>
                <button id="startGameBtn">🔫 НАЧАТЬ ИГРУ 🔫</button>
            </div>
        </div>
    </div>
</div>

<div id="victoryModal" class="victory-modal">
    <div class="victory-card">
        <h2>🎉 ПОБЕДА! 🎉</h2>
        <img id="winPhoto" class="friend-photo" src="doom.jpg" alt="Смешное фото" onerror="this.src='https://via.placeholder.com/280x280?text=ВСТАВЬ+ВЕСЕЛОЕ+ФОТО'">
        <div class="dr-caption">
            🎂 С Днем рождения, АРТЁМ, счастья, здоровья, богатства, оставайся всегда таким же крутым!!! 🎂
        </div>
        <button class="close-btn" id="closeWinModalBtn">🎁 ЗАКРЫТЬ 🎁</button>
    </div>
</div>

<div id="defeatModal" class="defeat-modal">
    <div class="defeat-card">
        <h2>😭 ПРОИГРЫШ 😭</h2>
        <img id="defeatPhoto" class="friend-photo" src="sad.png" alt="Грустное фото" onerror="this.src='https://via.placeholder.com/280x280?text=ВСТАВЬ+ГРУСТНОЕ+ФОТО'">
        <div class="dr-caption defeat-caption">
            ПОЗДРАВЛЕНИЕ ПОКА НЕДОСТУПНО(((
        </div>
        <button class="close-btn" id="closeDefeatModalBtn">🔄 ПОПРОБОВАТЬ СНОВА</button>
    </div>
</div>

<script>
    (function(){
        const MUSIC_FILE = "doom.mp3";
        const MUSIC_VOLUME = 0.4;
        const MUSIC_LOOP = true;
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width = 900;
        let height = 550;
        canvas.width = width;
        canvas.height = height;
        
        let score = 0;
        let gameActive = false;
        let gameWin = false;
        let gameLose = false;
        let missedGifts = 0;        // <--- ДОБАВИТЬ (счётчик пропусков)
        const MAX_MISSES = 3;       
        let gifts = [];
        let explosions = [];
        let fireworks = [];
        let floatingTexts = []; // массив для всплывающих надписей
        
        let spawnInterval = null;
        const MAX_GIFTS = 20;
        const GIFT_SIZE = 52;
        const FALL_SPEED = 6;
        
        let animationId = null;
        
        let backgroundMusic = null;
        let isMusicOn = true;
        let isSfxOn = true;
        let audioCtx = null;
        
        // Список рандомных надписей
        const hitMessages = [
            "УРА!", "ВАУ!", "ОГО!", "БУМ!", "ТАЩИШЬ",
            "ПОПАЛ!", "КРАСАВА!", "МЕТКО!", "ОГОНЬ!"
        ];
        
        // Фоновая картинка
        const backgroundImage = new Image();
        backgroundImage.src = "back.jpg";
        let backgroundLoaded = false;
        
        backgroundImage.onload = () => {
            backgroundLoaded = true;
        };
        
        backgroundImage.onerror = () => {
            console.log("Фон не загрузился, используем градиент");
            backgroundLoaded = false;
        };
        
        function addFloatingText(x, y) {
            const randomMessage = hitMessages[Math.floor(Math.random() * hitMessages.length)];
            floatingTexts.push({
                text: randomMessage,
                x: x + GIFT_SIZE/2,
                y: y + GIFT_SIZE/2 - 20,
                life: 1.0,
                offsetY: 0
            });
        }
        
        function updateFloatingTexts() {
            for(let i = 0; i < floatingTexts.length; i++) {
                const t = floatingTexts[i];
                t.life -= 0.02;
                t.offsetY -= 1.5;
                if(t.life <= 0) {
                    floatingTexts.splice(i,1);
                    i--;
                }
            }
        }
        
        function initSounds() {
            try {
                backgroundMusic = new Audio(MUSIC_FILE);
                backgroundMusic.loop = MUSIC_LOOP;
                backgroundMusic.volume = MUSIC_VOLUME;
                
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioCtx();
                
                function playHit() {
                    if(!isSfxOn || !audioCtx) return;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = 880;
                    gain.gain.value = 0.15;
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
                    osc.stop(audioCtx.currentTime + 0.3);
                }
                
                function playLoseSound() {
                    if(!isSfxOn || !audioCtx) return;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = 440;
                    gain.gain.value = 0.2;
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
                    osc.stop(audioCtx.currentTime + 0.5);
                    
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.frequency.value = 330;
                    gain2.gain.value = 0.2;
                    osc2.start(audioCtx.currentTime + 0.2);
                    gain2.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.7);
                    osc2.stop(audioCtx.currentTime + 0.7);
                    
                    const osc3 = audioCtx.createOscillator();
                    const gain3 = audioCtx.createGain();
                    osc3.connect(gain3);
                    gain3.connect(audioCtx.destination);
                    osc3.frequency.value = 200;
                    gain3.gain.value = 0.25;
                    osc3.start(audioCtx.currentTime + 0.4);
                    gain3.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.9);
                    osc3.stop(audioCtx.currentTime + 0.9);
                }
                
                function playWinFanfare() {
                    if(!isSfxOn || !audioCtx) return;
                    const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
                    notes.forEach((freq, index) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.frequency.value = freq;
                        gain.gain.value = 0.35;
                        const startTime = audioCtx.currentTime + (index * 0.2);
                        osc.start(startTime);
                        gain.gain.exponentialRampToValueAtTime(0.00001, startTime + 0.4);
                        osc.stop(startTime + 0.4);
                    });
                    
                    const drumOsc = audioCtx.createOscillator();
                    const drumGain = audioCtx.createGain();
                    drumOsc.connect(drumGain);
                    drumGain.connect(audioCtx.destination);
                    drumOsc.frequency.value = 120;
                    drumGain.gain.value = 0.45;
                    drumOsc.start(audioCtx.currentTime + 0.05);
                    drumGain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.35);
                    drumOsc.stop(audioCtx.currentTime + 0.35);
                    
                    const drumOsc2 = audioCtx.createOscillator();
                    const drumGain2 = audioCtx.createGain();
                    drumOsc2.connect(drumGain2);
                    drumGain2.connect(audioCtx.destination);
                    drumOsc2.frequency.value = 100;
                    drumGain2.gain.value = 0.4;
                    drumOsc2.start(audioCtx.currentTime + 0.4);
                    drumGain2.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.7);
                    drumOsc2.stop(audioCtx.currentTime + 0.7);
                }
                
                function resumeAudioContext() {
                    if(audioCtx && audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                }
                
                function startMusic() {
                    if(!isMusicOn || gameWin || gameLose || !gameActive) return;
                    try {
                        if(backgroundMusic) {
                            backgroundMusic.currentTime = 0;
                            backgroundMusic.play().catch(e => console.log("Нужен клик"));
                        }
                    } catch(e) {}
                }
                
                function stopMusic() {
                    if(backgroundMusic) {
                        backgroundMusic.pause();
                        backgroundMusic.currentTime = 0;
                    }
                }
                
                window.gameAudio = {
                    startMusic: startMusic,
                    stopMusic: stopMusic,
                    playHit: playHit,
                    playLoseSound: playLoseSound,
                    playWinFanfare: playWinFanfare,
                    resumeCtx: resumeAudioContext
                };
                
            } catch(e) {
                console.warn("Звуки не поддерживаются:", e);
            }
        }
        
        function playHitSound() {
            if(window.gameAudio && window.gameAudio.playHit) window.gameAudio.playHit();
        }
        
        function playLoseSound() {
            if(window.gameAudio && window.gameAudio.playLoseSound) window.gameAudio.playLoseSound();
        }
        
        function playWinFanfare() {
            if(window.gameAudio && window.gameAudio.playWinFanfare) window.gameAudio.playWinFanfare();
        }
        
        function startMusic() {
            if(window.gameAudio && window.gameAudio.startMusic && isMusicOn && !gameWin && !gameLose && gameActive) {
                window.gameAudio.startMusic();
            }
        }
        
        function stopMusic() {
            if(window.gameAudio && window.gameAudio.stopMusic) window.gameAudio.stopMusic();
        }
        
        function resumeAudio() {
            if(window.gameAudio && window.gameAudio.resumeCtx) window.gameAudio.resumeCtx();
        }
        
        const winModal = document.getElementById('victoryModal');
        const defeatModal = document.getElementById('defeatModal');
        const closeWinBtn = document.getElementById('closeWinModalBtn');
        const closeDefeatBtn = document.getElementById('closeDefeatModalBtn');
        const startOverlay = document.getElementById('startOverlay');
        const startGameBtn = document.getElementById('startGameBtn');
        
        function showWinModal() {
            winModal.classList.add('show');
            stopMusic();
            playWinFanfare();
        }
        
        function hideWinModal() {
            winModal.classList.remove('show');
        }
        
        function showDefeatModal() {
            defeatModal.classList.add('show');
            stopMusic();
            playLoseSound();
        }
        
        function hideDefeatModal() {
            defeatModal.classList.remove('show');
        }
        
        closeWinBtn.addEventListener('click', () => hideWinModal());
        closeDefeatBtn.addEventListener('click', () => resetGame());
        
        winModal.addEventListener('click', (e) => { if(e.target === winModal) hideWinModal(); });
        defeatModal.addEventListener('click', (e) => { if(e.target === defeatModal) hideDefeatModal(); });
        
        function startGame() {
            if(gameActive) return;
            startOverlay.style.display = 'none';
            gameActive = true;
            gameWin = false;
            gameLose = false;
            score = 0;
            gifts = [];
            explosions = [];
            fireworks = [];
            floatingTexts = [];
            updateUI();
            
            if(spawnInterval) clearInterval(spawnInterval);
            spawnInterval = setInterval(() => {
                if(gameActive && !gameWin && !gameLose) spawnGift();
            }, 700);
            
            setTimeout(() => {
                if(isMusicOn && gameActive && !gameWin && !gameLose) {
                    startMusic();
                }
            }, 100);
        }
        
        startGameBtn.addEventListener('click', () => {
            resumeAudio();
            startGame();
        });
        
        // function updateUI() {
        //     document.getElementById('scoreValue').innerText = score;
        //     const msgDiv = document.getElementById('gameMessage');
        //     if(gameWin) {
        //         msgDiv.innerHTML = "🎉✨ ПОБЕДА! СМОТРИ ФОТО И ПОЗДРАВЛЕНИЕ! ✨🎉";
        //     } else if(gameLose) {
        //         msgDiv.innerHTML = "😭 ПРОИГРЫШ! Артем пропустил подарки... Попробуй снова! 😭";
        //     } else if(!gameActive && !gameWin && !gameLose) {
        //         msgDiv.innerHTML = "💥 Нажми «НАЧАТЬ ИГРУ» чтобы начать!";
        //     } else {
        //         msgDiv.innerHTML = `💥 ГОДИКОВ: ${score}/28. Пропустишь 3 подарка — проигрыш! 🎁💣`;
        //     }
        // }


        function updateUI() {
            document.getElementById('scoreValue').innerText = score;
            const msgDiv = document.getElementById('gameMessage');
            if(gameWin) {
                msgDiv.innerHTML = "🎉✨ ПОБЕДА! СМОТРИ ФОТО И ПОЗДРАВЛЕНИЕ! ✨🎉";
            } else if(gameLose) {
                msgDiv.innerHTML = `😭 ПРОИГРЫШ! Артем пропустил ${missedGifts} подарков... Попробуй снова! 😭`;
            } else if(!gameActive && !gameWin && !gameLose) {
                msgDiv.innerHTML = "💥 Нажми «НАЧАТЬ ИГРУ» чтобы начать!";
            } else {
                const missesLeft = MAX_MISSES - missedGifts;
                msgDiv.innerHTML = `💥 ГОДИКОВ: ${score}/28. Осталось пропусков: ${missesLeft} 💥`;
            }
        }
            
        function gameOver() {
            if(gameWin || gameLose) return;
            
            missedGifts++;
            updateUI();
            
            if(missedGifts >= MAX_MISSES) {
                gameLose = true;
                gameActive = false;
                if(spawnInterval) clearInterval(spawnInterval);
                spawnInterval = null;
                updateUI();
                showDefeatModal();
            }
        }
        function addExplosion(x, y) {
            const particleCount = 18;
            for(let i = 0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 5;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                explosions.push({
                    x: x + GIFT_SIZE/2,
                    y: y + GIFT_SIZE/2,
                    vx: vx,
                    vy: vy,
                    life: 1.0,
                    size: 4 + Math.random() * 6,
                    color: `hsl(${Math.random() * 60 + 20}, 80%, 55%)`
                });
            }
            // Добавляем всплывающую надпись
            addFloatingText(x, y);
        }
        
        function startFireworks() {
            for(let i = 0; i < 180; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 3 + Math.random() * 8;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed - 3;
                fireworks.push({
                    x: width/2 + (Math.random() - 0.5) * 300,
                    y: height/2 + (Math.random() - 0.5) * 200,
                    vx: vx,
                    vy: vy,
                    life: 1.0,
                    size: 3 + Math.random() * 6,
                    color: `hsl(${Math.random() * 360}, 90%, 60%)`,
                    gravity: 0.15
                });
            }
            setTimeout(() => {
                if(gameWin) {
                    for(let i = 0; i < 120; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const speed = 4 + Math.random() * 7;
                        fireworks.push({
                            x: width/2 + (Math.random() - 0.5) * 400,
                            y: height/3 + Math.random() * 200,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed - 2,
                            life: 1.0,
                            size: 3 + Math.random() * 6,
                            color: `hsl(${Math.random() * 360}, 85%, 65%)`,
                            gravity: 0.12
                        });
                    }
                }
            }, 300);
        }
        
        function updateExplosions() {
            for(let i=0; i<explosions.length; i++) {
                const e = explosions[i];
                e.x += e.vx;
                e.y += e.vy;
                e.life -= 0.025;
                if(e.life <= 0 || e.y > height + 100 || e.x < -100 || e.x > width+100) {
                    explosions.splice(i,1);
                    i--;
                }
            }
        }
        
        function updateFireworks() {
            for(let i=0; i<fireworks.length; i++) {
                const f = fireworks[i];
                f.vx *= 0.99;
                f.vy += f.gravity || 0.1;
                f.x += f.vx;
                f.y += f.vy;
                f.life -= 0.008;
                if(f.life <= 0 || f.y > height + 100 || f.x < -100 || f.x > width+100) {
                    fireworks.splice(i,1);
                    i--;
                }
            }
        }
        
        function spawnGift() {
            if(!gameActive || gameWin || gameLose) return;
            if(gifts.length >= MAX_GIFTS) return;
            const x = 20 + Math.random() * (width - GIFT_SIZE - 20);
            gifts.push({
                x: x,
                y: -GIFT_SIZE,
                w: GIFT_SIZE,
                h: GIFT_SIZE,
                shakeOffset: 0,
                shakeTimer: 0
            });
        }
        
        function updateGifts() {
            for(let i = 0; i < gifts.length; i++) {
                const g = gifts[i];
                g.y += FALL_SPEED;
                
                // Эффект "тряски" подарков
                if(g.shakeTimer > 0) {
                    g.shakeTimer--;
                    g.shakeOffset = Math.sin(Date.now() * 0.03) * 3;
                } else {
                    g.shakeOffset = 0;
                    // Случайная активация тряски
                    if(Math.random() < 0.02) {
                        g.shakeTimer = 10;
                    }
                }
                
                if(g.y + g.h > height + 30) {
                    gifts.splice(i,1);
                    if(gameActive && !gameWin && !gameLose) {
                        gameOver();
                    }
                    i--;
                }
            }
        }
        
        function draw() {
            if(!ctx) return;

            // Отрисовка фона
            if (backgroundLoaded) {
                ctx.drawImage(backgroundImage, 0, 0, width, height);
            } else {
                const grad = ctx.createLinearGradient(0, 0, 0, height);
                grad.addColorStop(0, '#1e2a3a');
                grad.addColorStop(1, '#0f1722');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);
            }
            
            ctx.font = "bold 26px 'Courier New'";
            ctx.fillStyle = "#ffcc77";
            ctx.fillText("🔥 АРТЕМ-DOOM 🔥", width-250, height-28);
            ctx.font = "12px monospace";
            ctx.fillStyle = "#ffaa66";
            ctx.fillText("взрывная мощь", width-150, height-10);
            
            for(let g of gifts) {
                const shakeX = g.shakeOffset || 0;
                ctx.shadowBlur = 6;
                ctx.shadowColor = "#ff8844";
                ctx.fillStyle = "#e34d4d";
                ctx.fillRect(g.x + shakeX, g.y, g.w, g.h);
                ctx.fillStyle = "#c0392b";
                ctx.fillRect(g.x+8 + shakeX, g.y+12, g.w-16, 8);
                ctx.fillRect(g.x+12 + shakeX, g.y+8, 8, g.h-16);
                ctx.fillStyle = "#f1c40f";
                ctx.beginPath();
                ctx.arc(g.x+g.w/2 + shakeX, g.y+12, 10, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#e67e22";
                ctx.fillRect(g.x+g.w/2-3 + shakeX, g.y+6, 6, 12);
                ctx.fillStyle = "#fff2aa";
                ctx.font = "28px monospace";
                ctx.fillText("🎁", g.x+15 + shakeX, g.y+42);
            }
            
            for(let e of explosions) {
                ctx.globalAlpha = e.life * 0.9;
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.size, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#ffaa33";
                ctx.beginPath();
                ctx.arc(e.x-1, e.y-1, e.size*0.4, 0, Math.PI*2);
                ctx.fill();
            }
            
            // Отрисовка всплывающих надписей
            for(let t of floatingTexts) {
                ctx.globalAlpha = t.life;
                ctx.font = `bold ${20 + (1 - t.life) * 10}px 'Courier New'`;
                const colors = ["#ffaa44", "#ff5555", "#88ff88", "#ff88ff", "#44aaff"];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                ctx.fillStyle = randomColor;                ctx.shadowBlur = 4;
                ctx.shadowColor = "#ff6600";
                ctx.fillText(t.text, t.x - 15, t.y + t.offsetY);
            }
            
            for(let f of fireworks) {
                ctx.globalAlpha = f.life * 0.95;
                ctx.fillStyle = f.color;
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.size, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#ffffffcc";
                ctx.beginPath();
                ctx.arc(f.x-1, f.y-1, f.size*0.4, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
            
            if(mouseX && mouseY && gameActive && !gameWin && !gameLose) {
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, 14, 0, Math.PI*2);
                ctx.strokeStyle = "#ff5555";
                ctx.lineWidth = 2.5;
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(mouseX-24, mouseY);
                ctx.lineTo(mouseX-12, mouseY);
                ctx.moveTo(mouseX+24, mouseY);
                ctx.lineTo(mouseX+12, mouseY);
                ctx.moveTo(mouseX, mouseY-24);
                ctx.lineTo(mouseX, mouseY-12);
                ctx.moveTo(mouseX, mouseY+24);
                ctx.lineTo(mouseX, mouseY+12);
                ctx.stroke();
                ctx.fillStyle = "#ff6666aa";
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, 6, 0, Math.PI*2);
                ctx.fill();
            }
            
            if(gameWin) {
                ctx.font = "bold 38px 'Courier New'";
                ctx.fillStyle = "#ffdd99";
                ctx.shadowBlur = 8;
                ctx.fillText("🏆 САЛЮТ! ПОБЕДА! 🏆", width/2-190, 70);
            }
            if(gameLose) {
                ctx.font = "bold 38px 'Courier New'";
                ctx.fillStyle = "#ff8866";
                ctx.shadowBlur = 8;
                ctx.fillText("😭 ПРОИГРЫШ... 😭", width/2-170, 70);
            }
        }
        
        let mouseX = width/2, mouseY = height/2;
        
        function handleCanvasClick(e) {
            if(!gameActive || gameWin || gameLose) return;
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clickX = (e.clientX - rect.left) * scaleX;
            let clickY = (e.clientY - rect.top) * scaleY;
            
            for(let i=0; i<gifts.length; i++) {
                const g = gifts[i];
                if(clickX >= g.x && clickX <= g.x+g.w && clickY >= g.y && clickY <= g.y+g.h) {
                    playHitSound();
                    addExplosion(g.x, g.y);
                    gifts.splice(i,1);
                    if(!gameWin && !gameLose && gameActive) {
                        score++;
                        updateUI();
                        if(score >= 28) {
                            gameWin = true;
                            gameActive = false;
                            if(spawnInterval) clearInterval(spawnInterval);
                            spawnInterval = null;
                            startFireworks();
                            updateUI();
                            stopMusic();
                            showWinModal();
                        }
                    }
                    break;
                }
            }
        }
        
        function updateMousePosition(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mx = (e.clientX - rect.left) * scaleX;
            let my = (e.clientY - rect.top) * scaleY;
            if(mx >=0 && mx <= width && my >=0 && my <= height) {
                mouseX = mx;
                mouseY = my;
            }
        }
        
        function resetGame() {
            if(spawnInterval) clearInterval(spawnInterval);
            if(animationId) cancelAnimationFrame(animationId);
            
            score = 0;
            missedGifts = 0;
            gameActive = false;
            gameWin = false;
            gameLose = false;
            gifts = [];
            explosions = [];
            fireworks = [];
            floatingTexts = [];
            hideWinModal();
            hideDefeatModal();
            
            updateUI();
            
            startOverlay.style.display = 'flex';
            stopMusic();
            
            function gameLoop() {
                if(!gameWin && !gameLose) {
                    updateGifts();
                }
                updateExplosions();
                updateFireworks();
                updateFloatingTexts();
                draw();
                animationId = requestAnimationFrame(gameLoop);
            }
            animationId = requestAnimationFrame(gameLoop);
        }
        
        const musicToggle = document.getElementById('musicToggleBtn');
        const sfxToggle = document.getElementById('sfxToggleBtn');
        
        musicToggle.addEventListener('click', () => {
            isMusicOn = !isMusicOn;
            if(isMusicOn) {
                musicToggle.textContent = '🎵 МУЗЫКА ВКЛ';
                startMusic();
            } else {
                musicToggle.textContent = '🔇 МУЗЫКА ВЫКЛ';
                stopMusic();
            }
        });
        
        sfxToggle.addEventListener('click', () => {
            isSfxOn = !isSfxOn;
            sfxToggle.textContent = isSfxOn ? '🔊 ЗВУКИ ВКЛ' : '🔇 ЗВУКИ ВЫКЛ';
        });
        
        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('mousemove', updateMousePosition);
        document.getElementById('resetButton').addEventListener('click', () => resetGame());
        
        initSounds();
        resetGame();
    })();
</script>
</body>
</html>
